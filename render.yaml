# CareFlow — one-click deploy blueprint for Render (https://render.com).
# In Render: New → Blueprint → connect this repo → Apply.
# Provisions a Postgres database, the API web service, and the static client.
#
# Local dev still uses SQLite (see server/prisma/schema.prisma). The API build
# swaps the Prisma provider to postgresql for the cloud, so nothing changes locally.

databases:
  - name: careflow-db
    plan: free
    databaseName: careflow
    user: careflow

services:
  # --- API (Node + Express + Prisma) ---
  - type: web
    name: careflow-api
    runtime: node
    plan: free
    rootDir: server
    healthCheckPath: /api/health
    buildCommand: >
      npm install &&
      sed -i 's/provider = "sqlite"/provider = "postgresql"/' prisma/schema.prisma &&
      npx prisma generate
    startCommand: >
      npx prisma db push --skip-generate --accept-data-loss &&
      node prisma/seed.js &&
      node src/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: careflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true          # Render generates a strong secret
      - key: SKIP_SEED_IF_PRESENT
        value: "1"                    # seed once, don't wipe on redeploys
      - key: NODE_VERSION
        value: "22"
      # CLIENT_ORIGIN is intentionally unset → CORS reflects the caller's origin.
      # Set it to your client URL to lock CORS down once you know it.

  # --- Client (React + Vite static site) ---
  - type: web
    name: careflow-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html      # SPA fallback for React Router
    envVars:
      - key: VITE_API_URL
        sync: false                   # Render prompts you for this — set it to
                                      # https://<your-api>.onrender.com/api after the API deploys
